name: Deploy to aaPanel (Local)

on:
  push:
    branches:
      - master  # ให้ทำงานเมื่อมี Push ไปที่ branch master

jobs:
  deploy:
    runs-on: self-hosted  # สั่งให้รันบนเครื่อง Ubuntu ของเราเอง

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy files to Web Root
        run: |
          # ใช้ sudo เพื่อให้มีสิทธิ์เขียนไฟล์ในโฟลเดอร์ของ aaPanel
          sudo rsync -avz --exclude='.git' ./ /www/wwwroot/10.0.2.15/
          
          # ปรับ owner ให้เป็น www เพื่อให้ Nginx/PHP ทำงานได้ปกติ
          sudo chown -R www:www /www/wwwroot/10.0.2.15/