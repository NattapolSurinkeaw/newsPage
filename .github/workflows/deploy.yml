name: Deploy to aaPanel (Local)

on:
  push:
    branches:
      - master  # ให้ทำงานเมื่อมี Push ไปที่ branch master

jobs:
  deploy:
    runs-on: self-hosted  # สั่งให้รันบนเครื่อง Ubuntu ของเราเอง

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy files to Web Root
        run: |
          # 1. Sync โค้ดโดยข้าม .git และ .user.ini
          sudo rsync -avz --exclude='.git' --exclude='.user.ini' ./ /www/wwwroot/sitenews.com/
          
          # 2. ปรับ Owner ให้ www:www โดยระบุเจาะจงเฉพาะสิ่งที่ซิงก์ลงไป (ไม่ไปโดน .user.ini)
          sudo chown -R www:www /www/wwwroot/sitenews.com/*